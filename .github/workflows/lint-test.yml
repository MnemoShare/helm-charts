name: Lint and Test Charts

# Runs on every PR (no path filter) so it can serve as a required status
# check on `main` — a path-filtered workflow would never report on PRs that
# only touch docs/CI, leaving branch protection in a "expected, never
# arrived" state and blocking the merge.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add minio https://charts.min.io/
          helm repo update

      - name: Run chart-testing (lint)
        run: ct lint --target-branch main --charts charts/mnemoshare

      - name: Validate chart templates (default — sftpGateway disabled)
        if: github.event_name == 'pull_request'
        run: |
          # Validate that chart templates render correctly with test values
          # Note: Full install test skipped because the app requires real MongoDB/S3
          helm template mnemoshare charts/mnemoshare \
            --set customerId="ci-test" \
            --set mongodb.external.enabled=true \
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test" \
            --set s3.bucket="test-bucket" \
            --set s3.accessKey="test-key" \
            --set s3.secretKey="test-secret" \
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty" \
            --set encryption.key="test-encryption-key-exactly-32by" \
            --set license.key="test-license-key" \
            --set appUrl="https://test.example.com" \
            --set ingress.enabled=false \
            > /dev/null
          echo "✓ Default-path chart templates rendered successfully"

      - name: Validate chart templates (sftpGateway enabled)
        if: github.event_name == 'pull_request'
        run: |
          # Render the sftpGateway-enabled path so the new deployment,
          # service, secret derivation, NetworkPolicy block, and the
          # encryption.key fail-fast guard are exercised in CI. Catches
          # template-time regressions on the new files at no real cost.
          # PR #12 review's testing recommendation.
          helm template mnemoshare charts/mnemoshare \
            --set customerId="ci-test" \
            --set mongodb.external.enabled=true \
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test" \
            --set s3.bucket="test-bucket" \
            --set s3.accessKey="test-key" \
            --set s3.secretKey="test-secret" \
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty" \
            --set encryption.key="test-encryption-key-exactly-32by" \
            --set license.key="test-license-key" \
            --set appUrl="https://test.example.com" \
            --set ingress.enabled=false \
            --set sftpGateway.enabled=true \
            --set sftpGateway.hostKey.existingSecret="dummy-hostkey-secret" \
            > /dev/null
          echo "✓ sftpGateway-enabled chart templates rendered successfully"

      - name: Validate chart templates (keyguard enabled)
        if: github.event_name == 'pull_request'
        run: |
          # Render the keyguard-enabled path so the federation-sidecar
          # injection, cert-manager Certificate, projected SA token
          # volume, AWS-SDK env vars, and the keyguard volumes block
          # are all exercised in CI. PR #25 review's testing
          # recommendation (MSC-372).
          helm template mnemoshare charts/mnemoshare \
            --set customerId="ci-test" \
            --set mongodb.external.enabled=true \
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test" \
            --set s3.bucket="test-bucket" \
            --set s3.accessKey="test-key" \
            --set s3.secretKey="test-secret" \
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty" \
            --set encryption.key="test-encryption-key-exactly-32by" \
            --set license.key="test-license-key" \
            --set appUrl="https://test.example.com" \
            --set ingress.enabled=false \
            --set keyguard.enabled=true \
            --set keyguard.idpEndpoint="https://idp.mnemoshare.com:8443" \
            --set keyguard.roleArn="arn:aws:iam::686592509310:role/ci-test" \
            --set keyguard.cert.issuerName="step-ca-cluster-issuer" \
            > /dev/null
          echo "✓ keyguard-enabled chart templates rendered successfully"

      - name: Validate chart templates (keyguard + workflow-worker, both variants)
        if: github.event_name == 'pull_request'
        run: |
          # Render the keyguard-enabled path WITH workflow-worker
          # enabled so the worker-side sidecar injection is exercised
          # (chart 1.20.0 extension of the api-only step above).
          # Tests both worker variants — Deployment (default) and
          # StatefulSet (workflowWorker.persistence.enabled=true) —
          # because their volume conditional shapes differ and each
          # has a separate keyguard injection point.
          WORKER_BASE=(
            --set customerId="ci-test"
            --set mongodb.external.enabled=true
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test"
            --set s3.bucket="test-bucket"
            --set s3.accessKey="test-key"
            --set s3.secretKey="test-secret"
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty"
            --set encryption.key="test-encryption-key-exactly-32by"
            --set license.key="test-license-key"
            --set appUrl="https://test.example.com"
            --set ingress.enabled=false
            --set workflowWorker.enabled=true
            --set redis.external.enabled=true
            --set redis.external.host=redis.example.com
            --set keyguard.enabled=true
            --set keyguard.idpEndpoint="https://idp.mnemoshare.com:8443"
            --set keyguard.roleArn="arn:aws:iam::686592509310:role/ci-test"
            --set keyguard.cert.issuerName="step-ca-cluster-issuer"
          )

          # assert_sidecar_in_section verifies the sidecar appears in
          # a specific helm-template source section (a `# Source:`
          # comment block) of the rendered manifest. Section-scoping
          # prevents the api-pod's sidecar from masking a missing
          # worker-pod sidecar.
          assert_sidecar_in_section() {
            local out=$1 section=$2 label=$3
            if ! echo "$out" | awk -v sect="$section" '
              /^# Source: / { active = ($0 ~ sect); next }
              active && /- name: federation-sidecar/ { found = 1; exit }
              END { exit found ? 0 : 1 }'; then
              echo "✗ $label: federation-sidecar not present in $section"
              exit 1
            fi
          }

          # Variant 1: Deployment (persistence disabled, default).
          OUT=$(helm template mnemoshare charts/mnemoshare "${WORKER_BASE[@]}")
          assert_sidecar_in_section "$OUT" "workflow-worker-deployment.yaml" "Deployment variant"
          assert_sidecar_in_section "$OUT" "templates/deployment.yaml" "api Deployment (with worker enabled)"
          echo "✓ keyguard + worker Deployment variant rendered"

          # Variant 2: StatefulSet (persistence enabled).
          OUT=$(helm template mnemoshare charts/mnemoshare \
            "${WORKER_BASE[@]}" \
            --set workflowWorker.persistence.enabled=true \
            --set workflowWorker.persistence.size=10Gi)
          if ! echo "$OUT" | grep -q "kind: StatefulSet"; then
            echo "✗ StatefulSet variant: kind: StatefulSet not present"
            exit 1
          fi
          assert_sidecar_in_section "$OUT" "workflow-worker-statefulset.yaml" "StatefulSet variant"
          echo "✓ keyguard + worker StatefulSet variant rendered"

      - name: Validate keyguard required-field guards fail fast
        if: github.event_name == 'pull_request'
        run: |
          # Pin the PR #25 review's three required-guard concerns:
          # enabling keyguard MUST surface a render-time error if any
          # of (idpEndpoint, roleArn, cert.issuerName) is unset, or
          # if image.tag is empty (no rolling-tag fallback for a
          # credential broker). If any of these succeed silently we
          # lost the guard.
          BASE_VALUES=(
            --set customerId=ci-test
            --set mongodb.external.enabled=true
            --set mongodb.external.uri=mongodb://test:test@localhost:27017/test
            --set s3.bucket=test-bucket
            --set s3.accessKey=test-key
            --set s3.secretKey=test-secret
            --set-string jwt.ecPrivateKey=test-ec-key
            --set encryption.key=test-encryption-key-exactly-32by
            --set license.key=test-license-key
            --set appUrl=https://test.example.com
            --set ingress.enabled=false
            --set keyguard.enabled=true
            --set keyguard.idpEndpoint=https://idp.mnemoshare.com:8443
            --set keyguard.roleArn=arn:aws:iam::686592509310:role/ci-test
            --set keyguard.cert.issuerName=step-ca-cluster-issuer
          )
          assert_required_fails() {
            local label=$1
            local needle=$2
            shift 2
            set +e
            OUT=$(helm template mnemoshare charts/mnemoshare "${BASE_VALUES[@]}" "$@" 2>&1)
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo "✗ ${label}: helm template succeeded but should have failed"
              exit 1
            fi
            if ! echo "$OUT" | grep -q "$needle"; then
              echo "✗ ${label}: failure didn't mention '$needle'. Got:"
              echo "$OUT"
              exit 1
            fi
            echo "✓ ${label} fails fast"
          }
          assert_required_fails "keyguard.idpEndpoint" "idpEndpoint" --set keyguard.idpEndpoint=
          assert_required_fails "keyguard.roleArn" "roleArn" --set keyguard.roleArn=
          assert_required_fails "keyguard.cert.issuerName" "issuerName" --set keyguard.cert.issuerName=
          assert_required_fails "keyguard.sidecar.image.tag" "tag" --set keyguard.sidecar.image.tag=

      - name: Validate 1.21.0 chart-unification paths
        if: github.event_name == 'pull_request'
        run: |
          # Pin the PR #30 review's testing recommendations for the new
          # mode helpers, commonLabels, urlExistingSecret bridge, KEDA
          # guard, and stepCA-external fail. Each scenario corresponds
          # to one of the documented chart-unification features; a
          # silent regression on any of these would manifest as a
          # broken-but-rendering chart, exactly the failure mode the
          # validators were added to prevent.

          BASE=(
            --set customerId=ci-test
            --set mongodb.external.enabled=true
            --set mongodb.external.uri=mongodb://test:test@localhost:27017/test
            --set s3.bucket=test-bucket
            --set s3.accessKey=test-key
            --set s3.secretKey=test-secret
            --set-string jwt.ecPrivateKey=test-ec-key
            --set encryption.key=test-encryption-key-exactly-32by
            --set license.key=test-license-key
            --set appUrl=https://test.example.com
            --set ingress.enabled=false
          )

          # Scenario A — redis.mode=inCluster alone wires REDIS_URL.
          # Before the Phase 1.5 sweep, the app pod's Redis env vars
          # depended on the legacy `redis.enabled` flag, so setting
          # `mode: inCluster` without `enabled: true` produced an
          # in-cluster Redis Deployment that no pod could reach.
          OUT=$(helm template mnemoshare charts/mnemoshare "${BASE[@]}" \
            --set redis.mode=inCluster \
            --set redis.password=test-password)
          if ! echo "$OUT" | grep -q "name: REDIS_URL"; then
            echo "✗ Scenario A: redis.mode=inCluster did not wire REDIS_URL"
            exit 1
          fi
          # `mnemoshare-redis:6379` is the in-cluster service name when
          # the release name is `mnemoshare` (chart's fullname helper
          # collapses redundant prefixes). A render that points REDIS_URL
          # at anything else means the wiring picked the external branch
          # or the secret path instead of in-cluster.
          if ! echo "$OUT" | grep -q "@mnemoshare-redis:6379"; then
            echo "✗ Scenario A: REDIS_URL not pointed at in-cluster Redis service"
            exit 1
          fi
          echo "✓ Scenario A — redis.mode=inCluster wires REDIS_URL"

          # Scenario B — redis.external.urlExistingSecret renders REDIS_URL
          # via secretKeyRef, not inline. Sentinel URLs embed a password;
          # inlining them in the Deployment manifest leaks the password
          # to anyone with `kubectl get deploy -o yaml`.
          OUT=$(helm template mnemoshare charts/mnemoshare "${BASE[@]}" \
            --set redis.mode=external \
            --set redis.external.urlExistingSecret=mnemoshare-credentials)
          # REDIS_URL must appear AND must be sourced from secretKeyRef.
          # awk scans the api Deployment specifically (other manifests
          # might mention REDIS_URL in comments).
          if ! echo "$OUT" | awk '
            /^# Source: .*deployment\.yaml$/ { in_dep = 1 }
            /^# Source:/ && ! /deployment\.yaml$/ { in_dep = 0 }
            in_dep && /name: REDIS_URL/ { saw_name = 1 }
            in_dep && saw_name && /secretKeyRef:/ { found = 1; exit }
            END { exit found ? 0 : 1 }'; then
            echo "✗ Scenario B: REDIS_URL not wired via secretKeyRef"
            exit 1
          fi
          echo "✓ Scenario B — urlExistingSecret renders secretKeyRef"

          # Scenario C — commonLabels land in metadata.labels but NOT in
          # selectorLabels. spec.selector.matchLabels is immutable on
          # Deployment/StatefulSet, so leaking commonLabels into the
          # selector would break in-place helm upgrades.
          OUT=$(helm template mnemoshare charts/mnemoshare "${BASE[@]}" \
            --set commonLabels.tenant-id=acme \
            --set commonLabels.tier=enterprise)
          if ! echo "$OUT" | grep -q "tenant-id: acme"; then
            echo "✗ Scenario C: commonLabels not emitted on metadata.labels"
            exit 1
          fi
          # Find every spec.selector.matchLabels block and confirm
          # tenant-id is NOT inside any of them.
          if echo "$OUT" | awk '
            /matchLabels:/ { in_sel = 1; next }
            in_sel && /^      [^ ]/ { in_sel = 0 }
            in_sel && /tenant-id:/ { print; found = 1 }
            END { exit found ? 0 : 1 }'; then
            echo "✗ Scenario C: commonLabels leaked into spec.selector.matchLabels"
            exit 1
          fi
          echo "✓ Scenario C — commonLabels stay out of selectorLabels"

          # Scenario D — validateMode catches mode typos. This is THE
          # guard against the most common misconfiguration the PR
          # introduces (camelCase inCluster vs lowercase external/disabled).
          set +e
          OUT=$(helm template mnemoshare charts/mnemoshare "${BASE[@]}" \
            --set redis.mode=incluster 2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo "✗ Scenario D: validateMode did not fail on typo'd mode"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "redis.mode must be one of"; then
            echo "✗ Scenario D: validateMode error message not surfaced. Got:"
            echo "$OUT"
            exit 1
          fi
          echo "✓ Scenario D — validateMode catches mode typos"

          # Scenario E — KEDA + urlExistingSecret + no host fails. The
          # ScaledObject can't extract a Redis address from a secret
          # value at template time; if the user sets urlExistingSecret
          # without host:port, KEDA would render an invalid `:6379`
          # address and silently fail to scale.
          set +e
          OUT=$(helm template mnemoshare charts/mnemoshare "${BASE[@]}" \
            --set redis.mode=external \
            --set redis.external.urlExistingSecret=mnemoshare-credentials \
            --set workflowWorker.enabled=true \
            --set workflowWorker.autoscaling.enabled=true 2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo "✗ Scenario E: KEDA guard did not fail on urlExistingSecret + no host"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "redis.external.host"; then
            echo "✗ Scenario E: KEDA fail message did not name redis.external.host. Got:"
            echo "$OUT"
            exit 1
          fi
          echo "✓ Scenario E — KEDA guard fires on urlExistingSecret + no host"

          # Scenario F — stepCA.mode=external + mtls.enabled=true + no
          # caProvider.url fails. `external` is net-new (no legacy
          # path); silently rendering the api Deployment without
          # CA_SMALLSTEP_URL would dead-end mTLS auth.
          set +e
          OUT=$(helm template mnemoshare charts/mnemoshare "${BASE[@]}" \
            --set stepCA.mode=external \
            --set mtls.enabled=true 2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo "✗ Scenario F: stepCA-external guard did not fail without caProvider.url"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "mtls.caProvider.url"; then
            echo "✗ Scenario F: stepCA-external fail message did not name mtls.caProvider.url. Got:"
            echo "$OUT"
            exit 1
          fi
          echo "✓ Scenario F — stepCA-external guard fires without caProvider.url"

      - name: Validate sftpGateway encryption.key guard fails fast
        if: github.event_name == 'pull_request'
        run: |
          # Pin the PR #12 review concern 1 fix: enabling sftpGateway
          # without an explicit encryption.key (and without the
          # existingSecret escape hatches) MUST fail at template time,
          # not silently produce a deployment that 401s every gateway
          # call. If this `helm template` succeeds we lost the guard.
          set +e
          OUT=$(helm template mnemoshare charts/mnemoshare \
            --set customerId="ci-test" \
            --set mongodb.external.enabled=true \
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test" \
            --set s3.bucket="test-bucket" \
            --set s3.accessKey="test-key" \
            --set s3.secretKey="test-secret" \
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty" \
            --set license.key="test-license-key" \
            --set appUrl="https://test.example.com" \
            --set ingress.enabled=false \
            --set sftpGateway.enabled=true \
            --set sftpGateway.hostKey.existingSecret="dummy-hostkey-secret" \
            2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo "✗ Expected helm template to fail (no encryption.key set), but it succeeded"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "encryption.key"; then
            echo "✗ Expected the failure message to mention encryption.key, got:"
            echo "$OUT"
            exit 1
          fi
          echo "✓ sftpGateway.enabled without encryption.key fails fast as expected"
