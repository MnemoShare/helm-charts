name: Lint and Test Charts

# Runs on every PR (no path filter) so it can serve as a required status
# check on `main` — a path-filtered workflow would never report on PRs that
# only touch docs/CI, leaving branch protection in a "expected, never
# arrived" state and blocking the merge.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add minio https://charts.min.io/
          helm repo update

      - name: Run chart-testing (lint)
        run: ct lint --target-branch main --charts charts/mnemoshare

      - name: Validate chart templates (default — sftpGateway disabled)
        if: github.event_name == 'pull_request'
        run: |
          # Validate that chart templates render correctly with test values
          # Note: Full install test skipped because the app requires real MongoDB/S3
          helm template mnemoshare charts/mnemoshare \
            --set customerId="ci-test" \
            --set mongodb.external.enabled=true \
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test" \
            --set s3.bucket="test-bucket" \
            --set s3.accessKey="test-key" \
            --set s3.secretKey="test-secret" \
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty" \
            --set encryption.key="test-encryption-key-exactly-32by" \
            --set license.key="test-license-key" \
            --set appUrl="https://test.example.com" \
            --set ingress.enabled=false \
            > /dev/null
          echo "✓ Default-path chart templates rendered successfully"

      - name: Validate chart templates (sftpGateway enabled)
        if: github.event_name == 'pull_request'
        run: |
          # Render the sftpGateway-enabled path so the new deployment,
          # service, secret derivation, NetworkPolicy block, and the
          # encryption.key fail-fast guard are exercised in CI. Catches
          # template-time regressions on the new files at no real cost.
          # PR #12 review's testing recommendation.
          helm template mnemoshare charts/mnemoshare \
            --set customerId="ci-test" \
            --set mongodb.external.enabled=true \
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test" \
            --set s3.bucket="test-bucket" \
            --set s3.accessKey="test-key" \
            --set s3.secretKey="test-secret" \
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty" \
            --set encryption.key="test-encryption-key-exactly-32by" \
            --set license.key="test-license-key" \
            --set appUrl="https://test.example.com" \
            --set ingress.enabled=false \
            --set sftpGateway.enabled=true \
            --set sftpGateway.hostKey.existingSecret="dummy-hostkey-secret" \
            > /dev/null
          echo "✓ sftpGateway-enabled chart templates rendered successfully"

      - name: Validate sftpGateway encryption.key guard fails fast
        if: github.event_name == 'pull_request'
        run: |
          # Pin the PR #12 review concern 1 fix: enabling sftpGateway
          # without an explicit encryption.key (and without the
          # existingSecret escape hatches) MUST fail at template time,
          # not silently produce a deployment that 401s every gateway
          # call. If this `helm template` succeeds we lost the guard.
          set +e
          OUT=$(helm template mnemoshare charts/mnemoshare \
            --set customerId="ci-test" \
            --set mongodb.external.enabled=true \
            --set mongodb.external.uri="mongodb://test:test@localhost:27017/test" \
            --set s3.bucket="test-bucket" \
            --set s3.accessKey="test-key" \
            --set s3.secretKey="test-secret" \
            --set-string jwt.ecPrivateKey="test-ec-key-auto-generated-if-empty" \
            --set license.key="test-license-key" \
            --set appUrl="https://test.example.com" \
            --set ingress.enabled=false \
            --set sftpGateway.enabled=true \
            --set sftpGateway.hostKey.existingSecret="dummy-hostkey-secret" \
            2>&1)
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo "✗ Expected helm template to fail (no encryption.key set), but it succeeded"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "encryption.key"; then
            echo "✗ Expected the failure message to mention encryption.key, got:"
            echo "$OUT"
            exit 1
          fi
          echo "✓ sftpGateway.enabled without encryption.key fails fast as expected"
