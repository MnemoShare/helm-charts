name: Claude Code Review

# Trigger: `pull_request`. We previously used `pull_request_target` to expose
# secrets on fork PRs, but `anthropics/claude-code-action@v1`'s OIDC token
# exchange does not accept tokens issued under `pull_request_target` events
# (every run since the switch failed with `401 Invalid OIDC token`). Reverting
# to `pull_request` restores the gate. Fork PRs from external contributors
# will not auto-review under this trigger; if/when fork PR review becomes a
# real need, switch to a `workflow_run`-driven pattern instead.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    # Skip review on docs-only and lockfile-only PRs — review tokens add no signal.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/package-lock.json'
      - '**/go.sum'

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip Dependabot bumps — they're machine-generated and gated by CI + the
    # auto-approve workflow. Human review still fires on everything else.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Defense-in-depth: a malicious PR could theoretically include a file
      # at the verdict path. Claude writes to /tmp (outside the workspace),
      # but we clear it explicitly anyway.
      - name: Reset verdict file
        run: rm -f /tmp/claude-verdict.txt

      - name: Checkout PR head (read-only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Focus on:
            - Bugs, logic errors, and edge cases
            - Security concerns (injection, auth, secrets, IDOR)
            - Test coverage for new behavior
            - Adherence to repository conventions in CLAUDE.md when present
            - Performance issues

            Be specific: cite file paths and line numbers. Skip nits unless
            they cluster into a real concern.

            **Submit a formal review.** Use `gh pr review` — not a plain comment:
              - If clean with no blockers: `gh pr review --approve`
              - If blockers exist: `gh pr review --request-changes`
              - If only nits or unsure: `gh pr review --comment`

            **End your review body with one of these exact lines:**
              VERDICT: APPROVE
              VERDICT: BLOCK
              VERDICT: COMMENT

            The VERDICT line is parsed by Darrin (the auto-approval mirror) to
            post the human-account approval that satisfies branch protection.

            **Also write a verdict file** at `/tmp/claude-verdict.txt`:
              - `APPROVE` — the change is mergeable as-is. No blocking findings.
              - `BLOCK: <one-line reason>` — at least one finding must be
                addressed before merge. Post specifics as inline review
                comments first, then write the BLOCK line.

            The verdict file gates the CI status check; the gh pr review +
            VERDICT line gates the branch-protection merge approval. Both
            must agree (APPROVE in both, or BLOCK in both).

            Calibration: APPROVE only when you would genuinely sign off on
            this from a colleague. If you would request changes, use BLOCK.
            The verdict file is the merge gate — a real human will not be
            clicking approve, so be honest. Trivial nits (typos, comment
            wording, formatting preferences) are not BLOCK-worthy on their
            own; bugs, security gaps, broken contracts, or missing tests for
            new logic are.
          # Bash is allowed without a prefix filter. The prior allowlist
          # enumerated specific `gh pr <subcommand>:*` prefixes, which is
          # fine for simple calls but fails the bot's compound forms
          # (heredoc bodies, pipes, `bash -c '...'`) because Claude
          # Code's permission matcher does a literal prefix match on
          # the resolved command line — `bash -c "gh pr review ..."`
          # starts with `bash`, not `gh`, so it's denied.
          #
          # Symptom: high permission_denials_count (21 on
          # helm-charts#27 vs 8 on #26), bot writes its verdict file
          # but never completes `gh pr review --request-changes`, so
          # the BLOCK reasoning stays buried in CI logs.
          #
          # Risk: the bot is sandboxed in the GHA runner and gets a
          # PR-scoped GITHUB_TOKEN; it can already comment / mint
          # reviews via the existing allowlist. Broader Bash adds
          # network reach, which is a prompt-injection surface IF a
          # malicious PR could subvert the bot's instructions. We
          # accept that risk for two reasons: (1) the bot is loyal
          # to its prompt across thousands of turns, (2) the
          # downstream fallback step below catches BLOCK verdicts
          # the bot fails to surface as reviews — so the worst case
          # is "review is posted by GitHub Actions instead of the
          # bot" rather than "BLOCK silently disappears."
          claude_args: '--model claude-sonnet-4-6 --allowed-tools "Read,Glob,Grep,Write,Bash"'

      # Resilience layer: if the bot reached a BLOCK verdict but
      # couldn't complete the formal `gh pr review --request-changes`
      # call (silent-failure mode — see commit message), surface the
      # BLOCK as a request-changes review here so it appears in the
      # PR UI instead of staying buried in CI logs.
      #
      # Runs even if "Run Claude Code Review" errored — `if: always()`
      # guards us against losing the verdict to an unrelated upstream
      # failure.
      - name: Mirror BLOCK verdict to PR review (fallback)
        if: always() && github.event.pull_request.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ ! -f /tmp/claude-verdict.txt ]; then
            echo "::notice::No verdict file — nothing to mirror."
            exit 0
          fi
          verdict=$(head -n1 /tmp/claude-verdict.txt | sed 's/[[:space:]]*$//')
          case "$verdict" in
            BLOCK*) ;;
            *) echo "::notice::Verdict is '${verdict}' — nothing to mirror."; exit 0 ;;
          esac

          # If the bot already submitted ANY review on this PR HEAD
          # SHA, don't post a duplicate. We scope by commit_id so
          # stale reviews on prior commits don't suppress mirroring
          # of the current verdict.
          head_sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          existing=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --jq "[.[] | select(.commit_id == \"$head_sha\")] | length")
          if [ "${existing:-0}" -gt 0 ]; then
            echo "::notice::Bot already posted ${existing} review(s) on $head_sha — no mirror needed."
            exit 0
          fi

          reason="${verdict#BLOCK}"
          reason="${reason#:}"
          body=$(cat <<EOF
          The Claude review bot reached a \`BLOCK\` verdict but couldn't post a formal review (typically tool-permission denials at the action level — see the workflow run logs for the bot's full reasoning).

          Surfacing the verdict here so it's visible in the PR UI:

          > **BLOCK:**${reason}

          Push a fix and the bot will re-review. If the verdict is wrong, push a clarifying commit and re-run the \`Claude Code Review\` workflow.
          EOF
          )
          gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes --body "$body"
          echo "::notice::Mirrored BLOCK verdict to a PR review (bot failed to post one directly)."

      - name: Enforce verdict
        run: |
          if [ ! -f /tmp/claude-verdict.txt ]; then
            echo "::error::Claude did not produce /tmp/claude-verdict.txt — treating as BLOCK."
            exit 1
          fi
          verdict=$(head -n1 /tmp/claude-verdict.txt | sed 's/[[:space:]]*$//')
          echo "Claude verdict: $verdict"
          case "$verdict" in
            APPROVE)
              echo "::notice::Claude approved — no blocking findings."
              ;;
            BLOCK*)
              reason="${verdict#BLOCK}"
              reason="${reason#:}"
              echo "::error::Claude blocked merge:${reason}"
              exit 1
              ;;
            *)
              echo "::error::Unrecognized verdict: '$verdict' — treating as BLOCK."
              exit 1
              ;;
          esac
