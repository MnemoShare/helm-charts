# =============================================================================
# MnemoShare SaaS Customer Deployment
# =============================================================================
# This Helm chart deploys an isolated MnemoShare instance for a SaaS customer.
# Centralized services (Step-CA, ClamAV, Redis) are NOT deployed by this chart.
#
# Usage:
#   helm install acme-clinic mnemoshare-saas \
#     --set customer.id=acme-clinic \
#     --set customer.subdomain=acme-clinic \
#     --set tier=professional \
#     -f customer-secrets.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# Customer Configuration
# -----------------------------------------------------------------------------
customer:
  # Unique customer/organization ID (used for resource naming, S3 bucket paths)
  id: ""  # Required: e.g., "acme-clinic"
  
  # Subdomain for this customer (e.g., "acme-clinic" -> acme-clinic.mnemoshare.io)
  subdomain: ""  # Required: e.g., "acme-clinic"
  
  # Customer display name (shown in UI)
  name: ""  # Optional: e.g., "ACME Medical Clinic"
  
  # Custom domain (Enterprise tier only)
  # When set, creates additional ingress for custom domain
  customDomain: ""  # Optional: e.g., "files.acmeclinic.com"

# -----------------------------------------------------------------------------
# Tier Configuration
# -----------------------------------------------------------------------------
# Tier determines resource limits, features, and scaling parameters
# Valid values: starter, professional, business, enterprise
tier: professional

# Tier presets (override individual settings below if needed)
# These are automatically applied based on the 'tier' value
tiers:
  starter:
    users: 10
    storage: "100Gi"
    app:
      replicas: 2
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    workflowWorker:
      enabled: false
    autoscaling:
      maxReplicas: 3

  professional:
    users: 50
    storage: "500Gi"
    app:
      replicas: 2
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 2Gi
    workflowWorker:
      enabled: false
    autoscaling:
      maxReplicas: 5

  business:
    users: 200
    storage: "2Ti"
    app:
      replicas: 2
      resources:
        requests:
          cpu: 1000m
          memory: 2Gi
        limits:
          cpu: 4000m
          memory: 4Gi
    workflowWorker:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 2Gi
    autoscaling:
      maxReplicas: 10

  enterprise:
    users: 0  # Unlimited
    storage: "0"  # Custom (dedicated bucket)
    dedicatedBucket: true  # Enterprise gets dedicated S3 bucket
    app:
      replicas: 2
      resources:
        requests:
          cpu: 2000m
          memory: 4Gi
        limits:
          cpu: 8000m
          memory: 8Gi
    workflowWorker:
      enabled: true
      replicas: 3
      resources:
        requests:
          cpu: 1000m
          memory: 2Gi
        limits:
          cpu: 4000m
          memory: 4Gi
    autoscaling:
      maxReplicas: 20

# -----------------------------------------------------------------------------
# Application Configuration
# -----------------------------------------------------------------------------
app:
  # Number of app replicas (default: 2, overridden by tier)
  replicas: 2

  image:
    repository: mnemoshare/mnemoshare
    pullPolicy: IfNotPresent
    # Tag defaults to chart appVersion
    tag: ""

  # Resource limits (overridden by tier if not explicitly set)
  resources: {}

  # Pod annotations
  podAnnotations: {}

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity rules
  affinity: {}

# -----------------------------------------------------------------------------
# Database Configuration
# -----------------------------------------------------------------------------
# Shared MongoDB cluster - connection string provided by platform
database:
  # MongoDB connection URI
  # Format: mongodb://admin:<password>@mnemodb:27017,mongo-nyc:27017,mongo-atl:27017/<db>?authSource=admin&replicaSet=rs0
  uri: ""  # Required
  
  # Database name (customer-specific database within shared cluster)
  # Convention: mnemoshare-saas-{customer.id}
  name: ""  # Leave empty to auto-generate from customer.id

# Use existing secret for database credentials
# Secret must contain 'mongodb-uri' key
existingDatabaseSecret: ""

# -----------------------------------------------------------------------------
# Redis Configuration (Shared Sentinel Cluster)
# -----------------------------------------------------------------------------
# Shared Redis Sentinel cluster - connection string provided by platform
redis:
  # Redis Sentinel URL
  # Format: redis+sentinel://:<password>@node-0:26379,node-1:26379,node-2:26379/mymaster/0
  url: ""  # Required for workflow worker

# Use existing secret for Redis credentials
# Secret must contain 'redis-url' key
existingRedisSecret: ""

# -----------------------------------------------------------------------------
# Object Storage Configuration (DigitalOcean Spaces)
# -----------------------------------------------------------------------------
storage:
  # S3 endpoint (DigitalOcean Spaces)
  endpoint: "https://sfo3.digitaloceanspaces.com"
  region: "sfo3"
  
  # Bucket configuration varies by tier:
  # - Starter/Professional/Business: Shared bucket with customer prefix
  # - Enterprise: Dedicated bucket per customer
  #
  # For Enterprise tier, set dedicatedBucket: true and specify the bucket name
  dedicatedBucket: false  # Enterprise tier should set this to true
  
  # Bucket name
  # Shared mode: "mnemoshare-saas" (all non-Enterprise tiers)
  # Enterprise mode: customer-specific bucket (e.g., "mnemoshare-acme-clinic")
  bucket: "mnemoshare-saas"
  
  # Customer prefix within bucket (auto-generated if empty, ignored for dedicatedBucket)
  # Convention: customers/{customer.id}/
  prefix: ""
  
  # Access credentials
  accessKey: ""
  secretKey: ""

# Use existing secret for S3 credentials
# Secret must contain 's3-access-key' and 's3-secret-key' keys
existingStorageSecret: ""

# -----------------------------------------------------------------------------
# Centralized Services (NOT deployed by this chart)
# -----------------------------------------------------------------------------
# These services are deployed once for the entire SaaS platform.
# All customers share these centralized services.

# Step-CA (mTLS certificate authority)
# Architecture Decision: Centralized CA for all SaaS customers.
# This simplifies certificate management and is sufficient for expected load.
stepCA:
  # Enable Step-CA mTLS certificate authority
  enabled: false
  # URL to centralized Step-CA service
  url: ""  # e.g., "https://step-ca.mnemoshare-platform.svc.cluster.local"
  # Fingerprint for certificate verification (legacy, URL+provisioner via ConfigMap)
  fingerprint: ""

# Use existing secret for Step-CA credentials
# Secret must contain: provisioner-encrypted-key, provisioner-password, root-ca-cert
existingStepCASecret: ""

# Use existing ConfigMap for operator-managed configuration
# ConfigMap provides: CA_SMALLSTEP_URL, CA_SMALLSTEP_PROVISIONER, MTLS_ENABLED,
# SIEM_EXPORT_*, ICAP_URL, PRESIDIO_ENABLED, PRESIDIO_URL, SAAS_MODE, SAAS_CUSTOMER_ID, SAAS_TIER, etc.
existingConfigMap: ""

# MCP Server configuration
mcp:
  enabled: false
  apiKey:
    # Use existing secret for MCP API key
    # Secret must contain 'mcp-api-key' key
    existingSecret: ""

# ClamAV ICAP (virus scanning)
# Architecture Decision: Consistent URL across all regions.
# Single ICAP endpoint for uniform virus scanning.
icap:
  # URL to centralized ICAP service (consistent across regions)
  url: "icap://clamav.mnemoshare-platform.svc.cluster.local:1344"
  # ICAP service name
  service: "avscan"

# Presidio Analyzer (NER-based DLP scanning)
# Architecture Decision: Consistent URL across all regions.
# Single Presidio endpoint for uniform NER-based PII detection.
presidio:
  # URL to centralized Presidio Analyzer service
  url: "http://presidio-analyzer.mnemoshare-presidio.svc.cluster.local:3000"
  # Minimum confidence threshold (0.0-1.0)
  minConfidence: 0.5

# -----------------------------------------------------------------------------
# Encryption & Security
# -----------------------------------------------------------------------------
encryption:
  # Customer-specific encryption key (32 bytes)
  # Each customer has unique encryption key for data-at-rest
  key: ""  # Required

# Use existing secret for encryption key
# Secret must contain 'encryption-key' key
existingEncryptionSecret: ""

# JWT configuration (ES256 / ECDSA P-256)
jwt:
  # Customer-specific PEM-encoded EC P-256 private key for ES256 JWT signing
  ecPrivateKey: ""  # Required
  expiration: "24h"

# Use existing secret for JWT
# Secret must contain 'jwt-ec-private-key' key
existingJWTSecret: ""

# -----------------------------------------------------------------------------
# License Configuration
# -----------------------------------------------------------------------------
license:
  # Customer's license key
  key: ""  # Required

# Use existing secret for license
# Secret must contain 'license-key' key
existingLicenseSecret: ""

# -----------------------------------------------------------------------------
# Ingress Configuration
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  
  # Domain suffix for customer subdomains
  # Customer URL: {customer.subdomain}.{domainSuffix}
  domainSuffix: "mnemoshare.io"
  
  # TLS configuration
  tls:
    enabled: true
    # Use wildcard certificate (recommended for SaaS)
    wildcardSecretName: "mnemoshare-io-wildcard-tls"
    # Or generate per-customer certificate
    generateCertificate: false

# -----------------------------------------------------------------------------
# Workflow Worker (Business+ Tier)
# -----------------------------------------------------------------------------
workflowWorker:
  # Enable workflow worker (auto-enabled for Business+ tiers)
  # When enabled, deploys a separate workflow-worker deployment
  # that processes tasks from Redis queues (external/distributed mode)
  enabled: false
  
  # Number of worker replicas (overridden by tier)
  replicas: 2
  
  image:
    repository: mnemoshare/mnemoshare
    pullPolicy: IfNotPresent
    tag: ""
  
  # Worker concurrency (tasks per worker)
  concurrency: 10
  
  # Log level (debug, info, warn, error)
  logLevel: "info"
  
  # Temp disk size for file processing
  tempDiskSize: "5Gi"
  
  # Graceful shutdown timeout (seconds)
  # Workers get this long to finish processing before being killed
  terminationGracePeriodSeconds: 60
  
  # Resource limits (overridden by tier if not explicitly set)
  resources: {}
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity rules (for pod placement)
  affinity: {}

# -----------------------------------------------------------------------------
# Email Gateway (Outbound SMTP Relay)
# -----------------------------------------------------------------------------
# Deploys a separate email-gateway pod for outbound SMTP relay with
# DLP scanning and policy enforcement. Operator manages TLS and secrets.
emailGateway:
  # Enable email gateway (operator sets this based on capability)
  enabled: false

  # TLS certificate for STARTTLS (operator-copied secret)
  tls:
    existingSecret: ""

  # Upstream SMTP relay (non-sensitive config from configmap)
  upstream:
    host: ""
    port: 587
    tls: "starttls"

  # Secrets (operator-managed)
  existingUpstreamSecret: ""   # Secret with keys: upstream-username, upstream-password
  existingAPIKeySecret: ""     # Secret with key: gateway-api-key

  # Worker pool settings
  workerCount: 2
  queueSize: 500

  # Maximum SMTP recipients per message
  maxRecipients: 100

  # Comma-separated domains that must receive via TLS (e.g., "bank.com,healthcare.org")
  # Applies only in relay / inbound-relay modes.
  requireTlsDomains: ""

  # Require SMTP AUTH credentials for submission. Set to false when routing
  # from Google Workspace / M365 via sender-domain allowlist instead.
  smtpAuthRequired: true

  # Comma-separated sender domains allowed when smtpAuthRequired is false.
  smtpAllowedSenderDomains: ""

  # Require TLS on SMTP listeners (STARTTLS or implicit TLS).
  listenTlsRequired: true

  # HAProxy PROXY protocol for real client IP recovery. Default true for SaaS —
  # SaaS tenants sit behind a LoadBalancer/NLB and need the original client IP.
  proxyProtocol: true

  # Auth result cache TTL in seconds.
  authCacheTTL: 300

  # Sender lookup cache TTL in seconds.
  senderCacheTTL: 60

  # Maximum message size (accepts suffixes: KB, MB, GB).
  maxMessageSize: "25MB"

  # Maximum attachment size (accepts suffixes: KB, MB, GB).
  maxAttachmentSize: "50MB"

  # ICAP/ClamAV virus scanning (shared ClamAV instance)
  icap:
    url: ""           # e.g., "icap://clamav.mnemoshare-clamav.svc.cluster.local:1344"
    service: "avscan"
    timeout: 30
    required: false

  # DLP / scanning tunables (per-gateway — operator-copied configmap may override)
  dlp:
    # Presidio NER endpoint
    presidioUrl: ""
    # Apache Tika text-extraction endpoint
    tikaUrl: ""
    # Enable AI-powered DLP classification
    aiEnabled: false
    # LLM provider: "openai", "anthropic", "azure-openai"
    aiProvider: ""
    # Provider-specific model ID
    aiModel: ""
    # Existing secret (operator-managed) with key: ai-api-key
    existingAISecret: ""

  # Service (LoadBalancer for SaaS — external mail services must reach the gateway)
  service:
    type: LoadBalancer
    port: 25

  # Resource requests/limits
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Inbound Email Gateway (Receive + DLP + Spam Scoring)
# -----------------------------------------------------------------------------
# Deploys the inbound-gateway pod for receiving, scanning, and delivering
# inbound email. Automatically enabled when emailGateway is enabled.
# Shares API key, TLS, ICAP, and encryption key with the outbound gateway.
inboundGateway:
  # Enable inbound gateway (defaults to emailGateway.enabled)
  enabled: false

  # Processing and delivery worker counts
  processingWorkers: 4
  deliveryWorkers: 4

  # Postfix content filter and socketmap ports (internal, not exposed)
  contentFilterPort: 10025
  socketmapPort: 10070

  # DLP pipeline timeout (Go duration — total time for all DLP checks per message)
  dlpPipelineTimeout: "60s"

  # DLP timeout buffer (Go duration — safety margin before hard cutoff)
  dlpTimeoutBuffer: "5s"

  # DLP / scanning tunables (fall back to emailGateway.dlp.* when empty)
  dlp:
    presidioUrl: ""
    tikaUrl: ""

  # ARC (Authenticated Received Chain) signing for modified inbound messages
  arc:
    domain: ""
    selector: ""
    # Existing secret (operator-managed) with key: arc-private-key
    existingSecret: ""

  # Service (receives inbound SMTP from MX records)
  service:
    type: LoadBalancer
    port: 25

  # Resource requests/limits
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# KEDA Autoscaling
# -----------------------------------------------------------------------------
# Requires KEDA to be installed in the cluster
autoscaling:
  enabled: true
  
  # App autoscaling (TCP connections + memory based)
  app:
    enabled: true
    minReplicas: 2
    maxReplicas: 5  # Overridden by tier
    
    # Scale based on TCP connections
    tcp:
      enabled: true
      targetValue: 100  # Connections per pod
    
    # Scale based on memory utilization
    memory:
      enabled: true
      targetUtilization: 80
    
    # Cooldown periods
    pollingInterval: 15
    cooldownPeriod: 60
  
  # Workflow worker autoscaling (Redis queue depth based)
  workflowWorker:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    
    # Scale based on Redis queue length
    listLengthTarget: 5
    
    pollingInterval: 15
    cooldownPeriod: 60

# -----------------------------------------------------------------------------
# Service Configuration
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# -----------------------------------------------------------------------------
# Service Account
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -----------------------------------------------------------------------------
# Security Context
# -----------------------------------------------------------------------------
podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault

# -----------------------------------------------------------------------------
# Probes
# -----------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# -----------------------------------------------------------------------------
# Additional Environment Variables
# -----------------------------------------------------------------------------
extraEnv: []
# - name: CUSTOM_VAR
#   value: "custom_value"

# -----------------------------------------------------------------------------
# Addons (Optional Features)
# -----------------------------------------------------------------------------
addons:
  # MCP AI integration (Professional+ tier)
  mcp:
    enabled: false
    # API key is created in MnemoShare admin UI
    existingSecret: ""
  
  # Custom branding (Professional+ tier)
  branding:
    enabled: false
    logoUrl: ""
    primaryColor: ""
    companyName: ""
