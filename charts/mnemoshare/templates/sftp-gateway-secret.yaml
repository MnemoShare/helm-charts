{{- /*
Auto-create the gateway → API shared secret iff:
  1. sftpGateway is enabled
  2. operator hasn't pointed us at an existing secret
  3. the chart has visibility into the encryption key (i.e. the user
     hasn't pushed encryption-key management out to existingSecrets.encryption)

The secret value is sha256("mnemoshare-internal-api:" + ENCRYPTION_KEY) hex,
matching the derivation in internal/api/peer_notify.go (NewPeerNotifier).
The same secret value is used by every internal pod-to-pod call.

If existingSecrets.encryption is set, the chart can't see the key value
at template time and the operator must provide
sftpGateway.internalApiSecret.existingSecret pointing at a secret with
the same derived value. The deployment template fails fast in that case
(secretKeyRef will not resolve).
*/ -}}
{{- if and .Values.sftpGateway.enabled (not .Values.sftpGateway.internalApiSecret.existingSecret) (not .Values.existingSecrets.encryption) }}
{{- /*
  Guard the silent-break case (PR #12 review concern 1):
  `mnemoshare.encryptionKey` falls back to randAlphaNum 32 when
  .Values.encryption.key is empty, and randAlphaNum is NOT memoized
  across separate include calls. The data-plane secrets.yaml writes
  Key_A; this template would derive sha256(... + Key_B); the API
  rejects every /internal/sftp/auth call. Fail fast at template time
  with an actionable message rather than producing a deployment that
  401s every gateway connection.

  Operators have three valid paths in:
    1. Set .Values.encryption.key explicitly (the documented Required path)
    2. Pre-create the encryption secret and point existingSecrets.encryption at it
    3. Pre-create the gateway secret and point sftpGateway.internalApiSecret.existingSecret at it
*/ -}}
{{- if not .Values.encryption.key }}
{{- fail "sftpGateway.enabled requires .Values.encryption.key OR .Values.existingSecrets.encryption OR .Values.sftpGateway.internalApiSecret.existingSecret. Without an explicit encryption key, the auto-derived gateway → API shared secret would not match the data-plane key (randAlphaNum is not memoized across includes), causing every /internal/sftp/auth and /internal/sftp/audit call to 401." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mnemoshare.fullname" . }}-sftp-gateway
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
    app.kubernetes.io/component: sftp-gateway
type: Opaque
stringData:
  internal-api-secret: {{ printf "mnemoshare-internal-api:%s" (include "mnemoshare.encryptionKey" .) | sha256sum | quote }}
{{- end }}
