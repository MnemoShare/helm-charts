{{- /*
Auto-create the gateway → API shared secret iff:
  1. sftpGateway is enabled
  2. operator hasn't pointed us at an existing secret
  3. the chart has visibility into the encryption key (i.e. the user
     hasn't pushed encryption-key management out to existingSecrets.encryption)

The secret value is sha256("mnemoshare-internal-api:" + ENCRYPTION_KEY) hex,
matching the derivation in internal/api/peer_notify.go (NewPeerNotifier).
The same secret value is used by every internal pod-to-pod call.

If existingSecrets.encryption is set, the chart can't see the key value
at template time and the operator must provide
sftpGateway.internalApiSecret.existingSecret pointing at a secret with
the same derived value. The deployment template fails fast in that case
(secretKeyRef will not resolve).
*/ -}}
{{- if and .Values.sftpGateway.enabled (not .Values.sftpGateway.internalApiSecret.existingSecret) (not .Values.existingSecrets.encryption) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mnemoshare.fullname" . }}-sftp-gateway
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
    app.kubernetes.io/component: sftp-gateway
type: Opaque
stringData:
  internal-api-secret: {{ printf "mnemoshare-internal-api:%s" (include "mnemoshare.encryptionKey" .) | sha256sum | quote }}
{{- end }}
