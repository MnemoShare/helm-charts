{{- if .Values.workflowWorker.enabled }}
{{- if not .Values.workflowWorker.persistence.enabled }}
{{- /* Use Deployment when persistence is disabled; StatefulSet is used when persistence.enabled=true */}}
{{- if eq (include "mnemoshare.redisMode" .) "disabled" }}
{{- fail "workflowWorker.enabled requires Redis: set redis.mode=external (with redis.external.url) or redis.mode=inCluster (or legacy redis.enabled=true / redis.external.enabled=true)" }}
{{- end }}
{{- if eq .Values.database.driver "sqlite" }}
{{- fail "workflowWorker.enabled is not compatible with database.driver=sqlite. Use mongodb or postgres." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mnemoshare.fullname" . }}-workflow-worker
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflow-worker
spec:
  {{- if not .Values.workflowWorker.autoscaling.enabled }}
  replicas: {{ .Values.workflowWorker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: workflow-worker
  template:
    metadata:
      labels:
        {{- include "mnemoshare.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: workflow-worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mnemoshare.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: workflow-worker
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.workflowWorker.image.repository }}:{{ .Values.workflowWorker.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.workflowWorker.image.pullPolicy }}
        # Override command to run cmd/worker (MNI-27 unified hosted-binary).
        # Pre-MNI-27 this was /usr/local/bin/workflow-worker; that entrypoint was
        # retired in MNI-27 PR#4 (commit e6e243d). cmd/worker hosts every engine
        # at compile time and activates the configured subset via FILTERED_PROCESS.
        # For this Deployment the active set is .Values.workflowWorker.filteredProcess
        # (default: "background,workflow") — see the FILTERED_PROCESS env below.
        command: ["/usr/local/bin/worker"]
        env:
        # Tenant Identity — required for dispatch keyspace isolation.
        - name: CUSTOMER_ID
          value: {{ required "customerId is required: set --set customerId=<your-tenant-slug> at install/upgrade time" .Values.customerId | quote }}
        # Engine activation filter (MNS-505). Defaults to
        # "background,workflow" so the workflow-worker pod also consumes
        # background.* dispatch messages (virus_scan, metadata_extract,
        # report_generate). Override via .Values.workflowWorker.filteredProcess
        # — see values.yaml for the hazards of dropping "background".
        - name: FILTERED_PROCESS
          value: {{ .Values.workflowWorker.filteredProcess | default "background,workflow" | quote }}
        # Database Configuration (supports MongoDB and PostgreSQL for distributed workers)
        - name: DB_DRIVER
          value: {{ .Values.database.driver | default "mongodb" | quote }}
        {{- if or (eq .Values.database.driver "mongodb") (not .Values.database.driver) }}
        # MongoDB
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.mongodb }}{{ .Values.existingSecrets.mongodb }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: mongodb-uri
        - name: MONGODB_DATABASE
          value: {{ .Values.mongodb.external.database | quote }}
        {{- else if eq .Values.database.driver "postgres" }}
        # PostgreSQL
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.postgres }}{{ .Values.existingSecrets.postgres }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: postgres-dsn
        {{- end }}
        # Redis Connection
        # Note: REDIS_PASSWORD must be defined BEFORE REDIS_URL for $(REDIS_PASSWORD) substitution to work
        {{- if eq (include "mnemoshare.redisMode" .) "external" }}
        # External Redis
        {{- if .Values.redis.external.urlExistingSecret }}
        # Full URL (with embedded password) from a secret — used by the operator
        # to avoid plaintext REDIS_URL in the rendered StatefulSet/Deployment.
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.external.urlExistingSecret }}
              key: {{ .Values.redis.external.urlExistingSecretKey | default "redis-url" }}
        {{- else if .Values.redis.external.url }}
        - name: REDIS_URL
          value: {{ .Values.redis.external.url | quote }}
        {{- else }}
        {{- if or .Values.redis.external.existingSecret .Values.existingSecrets.redis }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.external.existingSecret | default .Values.existingSecrets.redis }}
              key: {{ .Values.existingSecretKeys.redisPassword | default "redis-password" }}
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@{{ .Values.redis.external.host }}:{{ .Values.redis.external.port | default 6379 }}/{{ .Values.redis.external.db | default 0 }}"
        {{- else }}
        - name: REDIS_URL
          value: "redis://{{ .Values.redis.external.host }}:{{ .Values.redis.external.port | default 6379 }}/{{ .Values.redis.external.db | default 0 }}"
        {{- end }}
        {{- end }}
        {{- else }}
        # Embedded Redis
        {{- if or .Values.redis.password .Values.redis.existingSecret }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.redis.existingSecret }}{{ .Values.redis.existingSecret }}{{ else }}{{ include "mnemoshare.fullname" . }}-redis{{ end }}
              key: redis-password
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@{{ include "mnemoshare.fullname" . }}-redis:6379/0"
        {{- else }}
        - name: REDIS_URL
          value: "redis://{{ include "mnemoshare.fullname" . }}-redis:6379/0"
        {{- end }}
        {{- end }}
        # Worker Configuration
        - name: WORKER_CONCURRENCY
          value: {{ .Values.workflowWorker.concurrency | quote }}
        {{- if .Values.workflowWorker.tempDir }}
        - name: TEMP_DIR
          value: {{ .Values.workflowWorker.tempDir | quote }}
        {{- end }}
        # Encryption Key (same as API server)
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.encryption }}{{ .Values.existingSecrets.encryption }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: encryption-key
        {{- if .Values.encryption.oldKey }}
        # Old encryption key for key rotation (temporary - remove after rotation completes)
        - name: OLD_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.encryption }}{{ .Values.existingSecrets.encryption }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: old-encryption-key
        {{- end }}
        # JWT EC private key (same as API server - for generating worker tokens)
        - name: JWT_EC_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.jwt }}{{ .Values.existingSecrets.jwt }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: jwt-ec-private-key
        # S3-compatible object storage. The worker hosts the background
        # engine (virus_scan, metadata_extract, report_generate, sftp etc.)
        # which all stream through storage.NewStorageManagerWithRepos. Without
        # these vars the worker's storage manager defaults to localhost:9000
        # and crashloops on the bucket pre-flight before the harness comes up.
        # Mirrors the API deployment's S3 wiring.
        {{- if .Values.minio.enabled }}
        # MinIO is enabled - use internal MinIO service endpoint
        - name: S3_ENDPOINT
          value: "{{ include "mnemoshare.fullname" . }}-minio:9000"
        - name: S3_REGION
          value: "us-east-1"
        - name: S3_BUCKET
          value: {{ .Values.s3.bucket | default "mnemoshare" | quote }}
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.minio.existingSecret }}{{ .Values.minio.existingSecret }}{{ else }}{{ include "mnemoshare.fullname" . }}-minio{{ end }}
              key: rootUser
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.minio.existingSecret }}{{ .Values.minio.existingSecret }}{{ else }}{{ include "mnemoshare.fullname" . }}-minio{{ end }}
              key: rootPassword
        - name: S3_USE_SSL
          value: "false"
        {{- else }}
        # External S3-compatible storage
        - name: S3_ENDPOINT
          value: {{ .Values.s3.endpoint | quote }}
        - name: S3_REGION
          value: {{ .Values.s3.region | quote }}
        - name: S3_BUCKET
          value: {{ .Values.s3.bucket | quote }}
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.s3 }}{{ .Values.existingSecrets.s3 }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.s3 }}{{ .Values.existingSecrets.s3 }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: s3-secret-key
        - name: S3_USE_SSL
          value: {{ .Values.s3.useSSL | quote }}
        {{- end }}
        # API Base URL (for uploading files to MnemoShare)
        - name: API_BASE_URL
          value: "http://{{ include "mnemoshare.fullname" . }}:{{ .Values.service.port }}/api/v1"
        # Logging
        - name: LOG_LEVEL
          value: {{ .Values.workflowWorker.logLevel | default "info" | quote }}
        # ClamAV ICAP endpoint (background.scan handler — env-seeded fallback;
        # primary config comes from MongoDB IcapConfig row)
        {{- if eq (include "mnemoshare.icapMode" .) "inCluster" }}
        - name: DEFAULT_ICAP_URL
          value: "icap://{{ include "mnemoshare.fullname" . }}-clamav:1344"
        - name: DEFAULT_ICAP_SERVICE
          value: "avscan"
        {{- else if eq (include "mnemoshare.icapMode" .) "external" }}
        - name: DEFAULT_ICAP_URL
          value: {{ .Values.clamav.external.url | quote }}
        - name: DEFAULT_ICAP_SERVICE
          value: {{ .Values.clamav.external.service | default "avscan" | quote }}
        {{- if .Values.clamav.external.required }}
        # When required=true the background scan handler refuses to process
        # files if ICAP is unreachable (matches the api Deployment's posture).
        - name: DEFAULT_ICAP_REQUIRED
          value: "true"
        {{- end }}
        {{- end }}
        # Cross-service integrations (rich-media thumbnails, Tika text
        # extraction, Presidio NER, AI DLP, KMS envelope flag) — MUST match
        # the api Deployment's surface or the background engine will silently
        # skip integration work that the api previously did in-process.
        # See templates/_helpers.tpl::mnemoshare.integrationEnv
        {{- include "mnemoshare.integrationEnv" . | nindent 8 }}
        # Disk buffer configuration (memory management for large file processing)
        {{- if .Values.diskBuffer.enabled }}
        - name: DISK_BUFFER_THRESHOLD_MB
          value: {{ .Values.diskBuffer.thresholdMB | quote }}
        - name: DISK_BUFFER_TEMP_DIR
          value: "/mnt/disk-buffer"
        - name: DISK_BUFFER_ENCRYPT
          value: {{ .Values.diskBuffer.encrypt | quote }}
        {{- end }}
        {{- if include "mnemoshare.keyguard.enabled" . }}
        # KeyGuard (MSC-371): worker reaches per-org KMS / S3 SIEM bucket
        # via the federation-sidecar — no static AWS creds on this pod.
        {{- include "mnemoshare.keyguard.envMain" . | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.workflowWorker.resources | nindent 12 }}
        {{- if or .Values.diskBuffer.enabled .Values.workflowWorker.tmpVolume.enabled (include "mnemoshare.keyguard.enabled" .) }}
        volumeMounts:
        {{- if .Values.diskBuffer.enabled }}
        - name: disk-buffer
          mountPath: /mnt/disk-buffer
        {{- end }}
        {{- if .Values.workflowWorker.tmpVolume.enabled }}
        # MNS-504: writable /tmp for background.scan handler (spools
        # decrypted streams to /tmp before posting to ICAP). Required
        # because the base image runs with readOnlyRootFilesystem=true.
        - name: tmp
          mountPath: /tmp
        {{- end }}
        {{- if include "mnemoshare.keyguard.enabled" . }}
        {{- include "mnemoshare.keyguard.volumeMountsMain" . | nindent 8 }}
        {{- end }}
        {{- end }}
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            # busybox pgrep on alpine matches against full /proc/N/cmdline,
            # so `-x worker` (basename) never matches `/usr/local/bin/worker`.
            # Drop -x → substring match (works for both procps and busybox).
            - "pgrep worker"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      {{- if include "mnemoshare.keyguard.enabled" . }}
      # KeyGuard federation-sidecar (MSC-371).
      {{- include "mnemoshare.keyguard.sidecarContainer" . | nindent 6 }}
      {{- end }}
      {{- if or .Values.diskBuffer.enabled .Values.workflowWorker.tmpVolume.enabled (include "mnemoshare.keyguard.enabled" .) }}
      volumes:
      {{- if .Values.workflowWorker.tmpVolume.enabled }}
      - name: tmp
        emptyDir:
          {{- if .Values.workflowWorker.tmpVolume.sizeLimit }}
          sizeLimit: {{ .Values.workflowWorker.tmpVolume.sizeLimit }}
          {{- end }}
      {{- end }}
      {{- if .Values.diskBuffer.enabled }}
      - name: disk-buffer
        {{- if eq .Values.diskBuffer.volume.type "emptyDir" }}
        emptyDir:
          {{- if .Values.diskBuffer.volume.emptyDir.medium }}
          medium: {{ .Values.diskBuffer.volume.emptyDir.medium }}
          {{- end }}
          {{- if .Values.diskBuffer.volume.emptyDir.sizeLimit }}
          sizeLimit: {{ .Values.diskBuffer.volume.emptyDir.sizeLimit }}
          {{- end }}
        {{- else if eq .Values.diskBuffer.volume.type "ephemeral" }}
        ephemeral:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              {{- if .Values.diskBuffer.volume.ephemeral.storageClassName }}
              storageClassName: {{ .Values.diskBuffer.volume.ephemeral.storageClassName }}
              {{- end }}
              resources:
                requests:
                  storage: {{ .Values.diskBuffer.volume.ephemeral.size }}
        {{- else if eq .Values.diskBuffer.volume.type "existingClaim" }}
        persistentVolumeClaim:
          claimName: {{ .Values.diskBuffer.volume.existingClaim.claimName }}
        {{- end }}
      {{- end }}
      {{- if include "mnemoshare.keyguard.enabled" . }}
      {{- include "mnemoshare.keyguard.volumes" . | nindent 6 }}
      {{- end }}
      {{- end }}
      {{- with .Values.workflowWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workflowWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml .Values.dnsConfig | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
