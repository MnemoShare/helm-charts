apiVersion: v1
kind: Service
metadata:
  name: {{ include "mnemoshare.fullname" . }}
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.mtls.enabled }}
    - port: {{ .Values.mtls.port | default 8443 }}
      targetPort: mtls
      protocol: TCP
      name: mtls
    {{- end }}
  selector:
    {{- include "mnemoshare.selectorLabels" . | nindent 4 }}
    # Match only api-component pods. Without this, the selector matches
    # ALL component pods (sftp-gateway, workflow-worker, mcp etc.) since
    # they all share the chart's selectorLabels. Routing port 80 → "http"
    # named-port to a non-api pod silently fails because only the api
    # container declares the "http" port. Mirrors the headless service
    # selector in service-headless.yaml.
    app.kubernetes.io/component: api
