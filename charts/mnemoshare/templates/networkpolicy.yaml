{{- if and .Values.networkPolicy .Values.networkPolicy.enabled }}
# NetworkPolicy for MnemoShare
# Implements defense-in-depth by restricting pod-to-pod communication
---
# Default deny all ingress/egress for MnemoShare pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-default-deny
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ingress to MnemoShare API pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-api-ingress
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
        {{- if .Values.mtls.enabled }}
        - protocol: TCP
          port: {{ .Values.mtls.port | default 8443 }}
        {{- end }}
    # Allow internal pod-to-pod communication (for license sync, health checks)
    - from:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    {{- with .Values.networkPolicy.extraApiIngress }}
    # Operator-supplied extra ingress rules (networkPolicy.extraApiIngress) —
    # e.g. an AS2 trading-partner namespace posting to /as2/receive, or a
    # monitoring namespace scraping the API. Rendered verbatim.
    {{- toYaml . | nindent 4 }}
    {{- end }}
---
# Allow egress from MnemoShare API pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-api-egress
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MongoDB (external or in-cluster)
    {{- if .Values.networkPolicy.mongodb.enabled }}
    - to:
        {{- if .Values.networkPolicy.mongodb.cidr }}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.mongodb.cidr }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.mongodb.port | default 27017 }}
    {{- end }}
    # S3/MinIO
    {{- if .Values.minio.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
    {{- else if .Values.networkPolicy.s3.enabled }}
    - to:
        {{- if .Values.networkPolicy.s3.cidr }}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.s3.cidr }}
        {{- else }}
        # Allow all egress to S3 (typically AWS/GCS public endpoints).
        # Excepts: RFC1918 (cluster pod/service CIDRs), 169.254.0.0/16
        # (cloud IMDS SSRF gate — AWS/GCP/Azure/DO metadata at port 80),
        # 100.64.0.0/10 (Tailscale CGNAT — must traverse the tailscale ns).
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
    {{- end }}
    # ClamAV ICAP (embedded)
    {{- if eq (include "mnemoshare.icapMode" .) "inCluster" }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clamav
      ports:
        - protocol: TCP
          port: 1344
    {{- end }}
    # ClamAV ICAP (external)
    {{- if eq (include "mnemoshare.icapMode" .) "external" }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 1344
    {{- end }}
    # Redis (embedded)
    {{- if eq (include "mnemoshare.redisMode" .) "inCluster" }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}
    # Redis (external)
    {{- if eq (include "mnemoshare.redisMode" .) "external" }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.redis.external.port | default 6379 }}
    {{- end }}
    # Step CA (for mTLS)
    {{- if eq (include "mnemoshare.stepCAMode" .) "inCluster" }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: step-ca
      ports:
        - protocol: TCP
          port: 9000
    {{- end }}
    # License server (external via public endpoint, or via ingress controller for in-cluster hairpin)
    {{- if .Values.networkPolicy.licenseServer.enabled }}
    - to:
        {{- if .Values.networkPolicy.licenseServer.cidr }}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.licenseServer.cidr }}
        {{- else }}
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
    # Allow traffic to ingress controller for license server hairpin NAT
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # SendGrid API (external)
    {{- if .Values.sendgrid.apiKey }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # OAuth/SSO providers (external)
    {{- if .Values.networkPolicy.oauth.enabled }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # External SMTP (customer-configured outbound mail relays — Gmail, Office365, SES, etc.)
    {{- if .Values.networkPolicy.smtp.enabled }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
      ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 2525
    {{- end }}
    # Workflow engine — broad egress for customer-authored workflow steps
    # (call_api, webhook, database_connect, sftp_*, ftps_*, as2_send, swift_*,
    # ebics_*, oftp2, llm_prompt, etc.) which accept arbitrary host:port.
    # An L4 port allowlist is theatrical for a workflows-enabled tenant, so
    # the substantive boundary moves up the stack to DLP, audit chain, and
    # anomaly detection. Private ranges are excluded for cluster + IMDS
    # isolation; UDP is denied (TCP-only) to block DNS exfil and QUIC.
    # Off by default for self-hosted; flip to true if the tenant has Workflows
    # licensed and you want the iPaaS-style egress posture.
    {{- if and .Values.networkPolicy.workflows .Values.networkPolicy.workflows.enabled }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Link-local (cloud IMDS SSRF gate)
              - 100.64.0.0/10    # Tailscale CGNAT
      ports:
        - protocol: TCP          # TCP only — block UDP egress
    {{- end }}
---
{{- if eq (include "mnemoshare.icapMode" .) "inCluster" }}
# ClamAV NetworkPolicy - only allow traffic from MnemoShare pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-clamav
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: clamav
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 1344
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # ClamAV definition updates (external) — opens :80 + :443, so the
    # IMDS gate is load-bearing here (without 169.254 in except, a
    # compromised ClamAV could reach cloud metadata over :80).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
---
{{- if eq (include "mnemoshare.redisMode" .) "inCluster" }}
# Redis NetworkPolicy - only allow traffic from MnemoShare and workflow workers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-redis
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
  egress:
    # Redis doesn't need egress in most cases
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
{{- end }}
---
{{- if .Values.mcp.enabled }}
# MCP Admin Server NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-mcp
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if and (eq .Values.mcp.transport.type "http") .Values.mcp.ingress.enabled }}
    # Allow traffic from ingress controller (for external MCP access)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: {{ .Values.mcp.transport.http.containerPort }}
    {{- end }}
    # Allow traffic from within the namespace (for kubectl port-forward, internal access)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.mcp.transport.http.containerPort | default 9222 }}
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MnemoShare API (headless service)
    - to:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
{{- end }}
{{- if .Values.sftpGateway.enabled }}
---
# SFTP gateway NetworkPolicy. The default-deny above selects on
# mnemoshare.selectorLabels, which also matches the sftp-gateway pods —
# so without this policy the gateway can neither receive SFTP nor reach
# the API. Mirrors the per-component pattern used by mcp and clamav above.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-sftp-gateway
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sftp-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public SFTP entry on the pod's containerPort 2222. The cloud LB
    # (or NodePort) terminates TCP and forwards here. Default permits any
    # source — set sftpGateway.networkPolicy.allowedSourceCIDRs to lock
    # it down when the partner set is known. Per-key Scope.AllowedIPs is
    # the application-layer enforcement and applies on top.
    - from:
        {{- if and .Values.sftpGateway.networkPolicy .Values.sftpGateway.networkPolicy.allowedSourceCIDRs }}
        {{- range .Values.sftpGateway.networkPolicy.allowedSourceCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
        {{- else }}
        - ipBlock:
            cidr: 0.0.0.0/0
        {{- end }}
      ports:
        - protocol: TCP
          port: 2222
    # In-cluster health endpoint (Prometheus scrapes via the
    # sftp-gateway-health ClusterIP Service, kubelet probes hit the pod
    # IP directly which most CNIs bypass NetworkPolicy for anyway).
    # `from: [{namespaceSelector: {}}]` constrains this to in-cluster
    # callers — without the selector an empty `from` would mean
    # "any source" (PR #12 review concern 4 — the previous "matches
    # node IP" comment was wrong; an empty `from` is permissive).
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8090
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MnemoShare API — /internal/sftp/auth (auth callback), /internal/sftp/audit
    # (lifecycle event relay), and the data-plane file ops the apiclient
    # makes on the user's behalf. The gateway never talks to S3/MongoDB
    # directly — every byte is proxied through the API.
    - to:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
{{- end }}
{{- if and .Values.emailGateway .Values.emailGateway.enabled }}
---
# Email gateway NetworkPolicy. The default-deny above selects on
# mnemoshare.selectorLabels, which also matches the email-gateway pods —
# so without this policy the gateway can neither receive SMTP nor reach
# the API or upstream relays. Mirrors the sftp-gateway pattern.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-email-gateway
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: email-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public SMTP entry on the pod's container ports. The deployment
    # declares :25 (SMTP) and :8081 (mgmt/health). The :587/:465 entries
    # cover STARTTLS/implicit-TLS variants when LISTEN_PORTS is overridden.
    # Permissive `from:` matches the public-MFT-endpoint expectation; the
    # SMTP auth + STARTTLS policy is the L7 boundary.
    - ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 2525
        - protocol: TCP
          port: 8081
    # Intra-namespace traffic from API for submission/control.
    - from:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
  egress:
    # DNS resolution (kube-dns + MX lookups for upstream relay)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MnemoShare API (gateway-to-API: delivery-status, audit)
    - to:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    # ClamAV ICAP (embedded) for attachment scanning
    {{- if eq (include "mnemoshare.icapMode" .) "inCluster" }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clamav
      ports:
        - protocol: TCP
          port: 1344
    {{- end }}
    # Upstream SMTP relay (external). Excepts mirror the api-egress SMTP
    # rule — RFC1918 + IMDS + Tailscale CGNAT.
    {{- if .Values.networkPolicy.smtp.enabled }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
      ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 2525
    {{- end }}
{{- end }}
{{- if and .Values.inboundGateway .Values.inboundGateway.enabled }}
---
# Inbound email gateway NetworkPolicy. The default-deny above selects on
# mnemoshare.selectorLabels, which also matches the inbound-gateway pods —
# so without this policy the gateway can neither receive content-filter
# traffic nor reach the API or S3 for storage. Mirrors the sftp-gateway pattern.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mnemoshare.fullname" . }}-inbound-gateway
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: inbound-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Inbound content-filter port and Postfix socketmap domain lookups.
    # Container ports per the deployment template: 8080 (mgmt/health),
    # 10025 (content-filter), 10070 (socketmap).
    - ports:
        - protocol: TCP
          port: 10025
        - protocol: TCP
          port: 10070
        - protocol: TCP
          port: 8080
    # Intra-namespace traffic from API for status/control.
    - from:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MnemoShare API (gateway-to-API: inbound message upload, audit)
    - to:
        - podSelector:
            matchLabels:
              {{- include "mnemoshare.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    # ClamAV ICAP (embedded) for attachment scanning
    {{- if eq (include "mnemoshare.icapMode" .) "inCluster" }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clamav
      ports:
        - protocol: TCP
          port: 1344
    {{- end }}
    # Public HTTPS — inbound-gateway writes raw .eml messages to S3 and on
    # startup verifies the bucket exists. Without this rule the gateway
    # crashes on boot with "failed to create default storage: i/o timeout".
    # Cached connections on pre-existing pods can mask this gap — see
    # mnemoshare-saas-infra/manifests/demo/LESSONS_LEARNED.md.
    {{- if .Values.networkPolicy.s3.enabled }}
    - to:
        {{- if .Values.networkPolicy.s3.cidr }}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.s3.cidr }}
        {{- else }}
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8       # RFC1918
              - 172.16.0.0/12    # RFC1918
              - 192.168.0.0/16   # RFC1918
              - 169.254.0.0/16   # Cloud IMDS SSRF gate
              - 100.64.0.0/10    # Tailscale CGNAT
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
{{- end }}
