{{- if .Values.inboundGateway.enabled }}
{{- /* Resolve TLS secret: inboundGateway.tls.existingSecret → emailGateway.tls.existingSecret → mtls.tls.existingSecret → none */}}
{{- $tlsSecret := .Values.inboundGateway.tls.existingSecret }}
{{- if and (not $tlsSecret) .Values.emailGateway.tls.existingSecret }}
{{- $tlsSecret = .Values.emailGateway.tls.existingSecret }}
{{- end }}
{{- if and (not $tlsSecret) .Values.mtls.tls.existingSecret }}
{{- $tlsSecret = .Values.mtls.tls.existingSecret }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mnemoshare.fullname" . }}-inbound-gateway
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
    app.kubernetes.io/component: inbound-gateway
spec:
  replicas: {{ .Values.inboundGateway.replicas }}
  selector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: inbound-gateway
  template:
    metadata:
      labels:
        {{- include "mnemoshare.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: inbound-gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mnemoshare.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: inbound-gateway
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/usr/local/bin/inbound-gateway"]
        ports:
        - name: health
          containerPort: 8080
          protocol: TCP
        - name: content-filter
          containerPort: 10025
          protocol: TCP
        - name: socketmap
          containerPort: 10070
          protocol: TCP
        env:
        - name: CONTENT_FILTER_PORT
          value: "10025"
        - name: SOCKETMAP_PORT
          value: "10070"
        - name: HEALTH_PORT
          value: "8080"
        - name: PROCESSING_WORKERS
          value: {{ .Values.inboundGateway.processingWorkers | quote }}
        - name: DELIVERY_WORKERS
          value: {{ .Values.inboundGateway.deliveryWorkers | quote }}
        {{- if $tlsSecret }}
        - name: TLS_CERT_PATH
          value: "/etc/tls/tls.crt"
        - name: TLS_KEY_PATH
          value: "/etc/tls/tls.key"
        {{- end }}
        # MnemoShare API connection
        - name: MNEMOSHARE_API_URL
          value: "http://{{ include "mnemoshare.fullname" . }}:{{ .Values.service.port }}"
        {{- if .Values.emailGateway.existingAPIKeySecret }}
        - name: MNEMOSHARE_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.emailGateway.existingAPIKeySecret }}
              key: gateway-api-key
        {{- else if .Values.emailGateway.apiKey }}
        - name: MNEMOSHARE_API_KEY
          value: {{ .Values.emailGateway.apiKey | quote }}
        {{- end }}
        # ICAP virus scanning
        {{- $icapURL := .Values.inboundGateway.icap.url }}
        {{- if and (not $icapURL) .Values.emailGateway.icap.url }}
        {{- $icapURL = .Values.emailGateway.icap.url }}
        {{- end }}
        {{- if and (not $icapURL) .Values.clamav.enabled }}
        {{- $icapURL = printf "icap://%s-clamav:1344/avscan" (include "mnemoshare.fullname" .) }}
        {{- end }}
        {{- if $icapURL }}
        - name: ICAP_URL
          value: {{ $icapURL | quote }}
        {{- end }}
        - name: ICAP_REQUIRED
          value: {{ .Values.inboundGateway.icap.required | quote }}
        # DLP pipeline timeouts
        - name: DLP_PIPELINE_TIMEOUT
          value: {{ .Values.inboundGateway.dlpPipelineTimeout | quote }}
        - name: DLP_TIMEOUT_BUFFER
          value: {{ .Values.inboundGateway.dlpTimeoutBuffer | quote }}
        # DLP / scanning (falls back to emailGateway.dlp.* when empty)
        {{- $presidioURL := .Values.inboundGateway.dlp.presidioUrl }}
        {{- if and (not $presidioURL) .Values.emailGateway.dlp.presidioUrl }}
        {{- $presidioURL = .Values.emailGateway.dlp.presidioUrl }}
        {{- end }}
        {{- if $presidioURL }}
        - name: PRESIDIO_URL
          value: {{ $presidioURL | quote }}
        {{- end }}
        {{- $tikaURL := .Values.inboundGateway.dlp.tikaUrl }}
        {{- if and (not $tikaURL) .Values.emailGateway.dlp.tikaUrl }}
        {{- $tikaURL = .Values.emailGateway.dlp.tikaUrl }}
        {{- end }}
        {{- if $tikaURL }}
        - name: TIKA_URL
          value: {{ $tikaURL | quote }}
        {{- end }}
        # ARC signing (for modified messages)
        {{- if .Values.inboundGateway.arc.domain }}
        - name: ARC_DOMAIN
          value: {{ .Values.inboundGateway.arc.domain | quote }}
        {{- end }}
        {{- if .Values.inboundGateway.arc.selector }}
        - name: ARC_SELECTOR
          value: {{ .Values.inboundGateway.arc.selector | quote }}
        {{- end }}
        {{- if .Values.inboundGateway.arc.existingSecret }}
        - name: ARC_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.inboundGateway.arc.existingSecret }}
              key: arc-private-key
        {{- else if .Values.inboundGateway.arc.privateKey }}
        - name: ARC_PRIVATE_KEY
          value: {{ .Values.inboundGateway.arc.privateKey | quote }}
        {{- end }}
        # Encryption key for internal API secret derivation
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ if .Values.existingSecrets.encryption }}{{ .Values.existingSecrets.encryption }}{{ else }}{{ include "mnemoshare.fullname" . }}-secrets{{ end }}
              key: encryption-key
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.inboundGateway.resources | nindent 12 }}
        {{- if $tlsSecret }}
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/tls
          readOnly: true
        {{- end }}
      {{- if $tlsSecret }}
      volumes:
      - name: tls-certs
        secret:
          secretName: {{ $tlsSecret }}
      {{- end }}
      {{- with .Values.inboundGateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.inboundGateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml .Values.dnsConfig | nindent 8 }}
      {{- end }}
{{- end }}
