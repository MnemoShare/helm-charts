{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mnemoshare.fullname" . }}-mcp
  labels:
    {{- include "mnemoshare.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mnemoshare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "mnemoshare.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mnemoshare.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      # Block MCP startup until the in-cluster API service is responding.
      # Without this, fresh installs racing the API/Mongo bootstrap burn 1-2
      # cosmetic CrashLoopBackOff cycles before MCP's auth bootstrap settles.
      # Polls the API service /health on a 2s tick; gives 60s of headroom
      # (well under the API's typical sub-30s ready time on a warm node).
      - name: wait-for-api
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        # Inherit the main container's hardening so clusters with the
        # `restricted` PodSecurityStandard don't reject the pod.
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        command: ["sh", "-c"]
        args:
          - |
            url="http://{{ include "mnemoshare.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local/health"
            i=0
            until wget -q -T 2 -O /dev/null "$url"; do
              i=$((i+1))
              if [ "$i" -ge 30 ]; then
                echo "ERROR: api at $url did not respond after 60s" >&2
                exit 1
              fi
              echo "waiting for api at $url (attempt $i) ..."
              sleep 2
            done
            echo "api ready after $i polls"
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
      containers:
      - name: mcp
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
        # Run the MCP admin server binary. Path matches the canonical
        # Dockerfile install location (`COPY --from=go-builder /bin/mcp-admin
        # /usr/local/bin/mcp-admin`). The previous `/app/mcp-admin` path does
        # not exist in any published mnemoshare image and crashlooped every
        # install with `mcp.enabled=true`.
        command: ["/usr/local/bin/mcp-admin"]
        args:
          - "--transport={{ .Values.mcp.transport.type }}"
          {{- if eq .Values.mcp.transport.type "http" }}
          - "--http-addr=:{{ .Values.mcp.transport.http.containerPort }}"
          {{- end }}
          - "--log-level={{ .Values.mcp.logging.level }}"
          - "--log-format={{ .Values.mcp.logging.format }}"
        {{- if eq .Values.mcp.transport.type "http" }}
        ports:
        - name: http
          containerPort: {{ .Values.mcp.transport.http.containerPort }}
          protocol: TCP
        {{- end }}
        env:
        # MCP API Key - Required for authentication
        - name: MNEMOSHARE_MCP_KEY
          valueFrom:
            secretKeyRef:
              {{- if .Values.mcp.apiKey.existingSecret }}
              name: {{ .Values.mcp.apiKey.existingSecret }}
              {{- else }}
              name: {{ include "mnemoshare.fullname" . }}-mcp
              {{- end }}
              key: mcp-api-key
        # MnemoShare API URL
        # Default: regular ClusterIP service. We previously defaulted to the
        # headless service, but headless services have no ClusterIP — DNS
        # returns pod IPs directly and HTTP defaults to :80, which has no
        # listener (the API listens on :8080 via the targetPort wiring of the
        # regular service). The regular ClusterIP service routes :80 → :8080
        # through kube-proxy and only matches api-component pods (the
        # service-headless.yaml selector pattern). Override mcp.apiUrl to
        # point elsewhere if you need to bypass the in-cluster service.
        - name: MNEMOSHARE_API_URL
          {{- if .Values.mcp.apiUrl }}
          value: {{ .Values.mcp.apiUrl | quote }}
          {{- else }}
          value: "http://{{ include "mnemoshare.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local/api/v1"
          {{- end }}
        # OAuth 2.1 browser-based authentication (skipped when both are empty).
        # MCP_EXTERNAL_URL: cmd/mcp-admin gates OAuth handler registration on this.
        # MNEMOSHARE_APP_URL: where the MCP server redirects users for SSO consent.
        {{- $mcpExternalUrl := include "mnemoshare.mcpExternalUrl" . }}
        {{- if $mcpExternalUrl }}
        - name: MCP_EXTERNAL_URL
          value: {{ $mcpExternalUrl | quote }}
        {{- end }}
        {{- if .Values.appUrl }}
        - name: MNEMOSHARE_APP_URL
          value: {{ .Values.appUrl | quote }}
        {{- end }}
        {{- if eq .Values.mcp.transport.type "http" }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        {{- end }}
        resources:
          {{- toYaml .Values.mcp.resources | nindent 12 }}
        volumeMounts:
        # Writable temp directory (required for readOnlyRootFilesystem)
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
      {{- with .Values.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
